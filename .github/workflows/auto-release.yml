name: Auto Release

on:
  schedule:
    - cron: "0 9 * * 1"  # every Monday at 09:00 UTC
  workflow_dispatch:

permissions: {}

jobs:
  release:
    permissions:
      contents: write
      pull-requests: write
    uses: damien-robotsix/robotsix-github-workflows/.github/workflows/auto-release.yml@00a453d21aa60e704fa7d36257327405cd25669a # main
    # Authenticates as the fleet GitHub App — the installation token is
    # minted inside the reusable workflow; no PAT to rotate. On this
    # squash-only protected repo the release lands via a squash
    # auto-merge PR; the annotated v* tag stays on the release commit.
    with:
      app-id: ${{ vars.RELEASE_APP_ID }}
    secrets:
      app-private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
