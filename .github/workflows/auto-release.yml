name: Auto Release

# CRITICAL: This workflow pushes commits and tags, so it MUST use a
# caller-supplied credential that is NOT the default GITHUB_TOKEN.
# GitHub deliberately suppresses workflow runs for events created by
# GITHUB_TOKEN to prevent recursion — if the caller passes
# GITHUB_TOKEN, the v* tag push will NOT trigger docker-release.yml
# and no image will ever be built.
#
# The caller MUST supply a GitHub App (app-id input + app-private-key
# secret). An installation token is minted per run; no expiry/rotation,
# bot identity. App tokens live ~1h so they cannot be stored as a
# static secret, which is why minting happens HERE and not in the
# caller (reusable-workflow `secrets:` cannot carry runtime step
# outputs).
#
# This workflow handles the 0.x release line only. A non-0.x version
# in pyproject.toml causes a hard failure — the caller must migrate
# to a different release workflow for 1.0+.

on:
  workflow_call:
    inputs:
      python-version:
        description: Python version to set up.
        required: false
        type: string
        default: "3.14"
      uv-version:
        description: uv version to install.
        required: false
        type: string
        default: "0.8.15"
      runs-on:
        description: Runner label for the release job.
        required: false
        type: string
        default: "ubuntu-latest"
      app-id:
        description: >
          GitHub App ID used to mint an installation token for the
          release push (pair with the app-private-key secret). The
          app must be installed on the repo with contents:write
          (+ pull-requests:write for the protected-branch fallback).
        required: true
        type: string
      default-branch:
        description: >
          Name of the default branch (e.g. "main" or "master").
          Used as the target for direct push and the PR base in the
          protected-branch fallback path.
        required: false
        type: string
        default: "main"
    secrets:
      app-private-key:
        description: >
          PEM private key of the GitHub App named by the app-id
          input. Required when app-id is set.
        required: true

permissions:
  contents: read

jobs:
  release:
    name: Release
    runs-on: ${{ inputs.runs-on }}
    permissions:
      # contents:write is required to push the release commit and tag
      # (and to create the release branch in the PR fallback path).
      contents: write
      # pull-requests:write is required for gh pr create + gh pr merge
      # in the protected-branch fallback path.
      pull-requests: write
    steps:
      - name: Mint GitHub App installation token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349  # v2.2.2
        with:
          app-id: ${{ inputs.app-id }}
          private-key: ${{ secrets.app-private-key }}

      # Checkout with the resolved release credential so the persisted
      # token carries the correct identity for git push. Unlike every
      # other workflow in this repo, we do NOT set
      # persist-credentials: false — this workflow MUST push commits
      # and tags (the dedicated credential is the whole point).
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      # Two-step interpreter setup matches python-ci.yml: setup-python
      # pins the interpreter, setup-uv installs the uv build frontend.
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ inputs.python-version }}

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: ${{ inputs.uv-version }}

      # ------------------------------------------------------------------
      # Fragment detection — must run AFTER checkout (needs the source
      # tree), so we cannot use a job-level `if:`. Instead we set a step
      # output `has_fragments` and guard every subsequent step with it.
      # When zero fragments exist the job exits successfully as a no-op.
      # ------------------------------------------------------------------
      - name: Detect towncrier fragments
        id: fragments
        run: |
          BREAKING=$(find changelog.d/ -maxdepth 1 -type f -name "*.breaking.md" 2>/dev/null | wc -l)
          FEATURE=$(find changelog.d/ -maxdepth 1 -type f -name "*.feature.md" 2>/dev/null | wc -l)
          BUGFIX=$(find changelog.d/ -maxdepth 1 -type f -name "*.bugfix.md" 2>/dev/null | wc -l)
          MISC=$(find changelog.d/ -maxdepth 1 -type f -name "*.misc.md" 2>/dev/null | wc -l)
          TOTAL=$((BREAKING + FEATURE + BUGFIX + MISC))

          if [ "$TOTAL" -eq 0 ]; then
            echo "No towncrier fragments found under changelog.d/ — nothing to release."
            echo "has_fragments=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_fragments=true" >> "$GITHUB_OUTPUT"
          echo "breaking=$BREAKING" >> "$GITHUB_OUTPUT"
          echo "feature=$FEATURE" >> "$GITHUB_OUTPUT"
          echo "bugfix=$BUGFIX" >> "$GITHUB_OUTPUT"
          echo "misc=$MISC" >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"

          # Bump rules:
          #   any *.breaking.md OR *.feature.md present → minor bump
          #   only *.bugfix.md / *.misc.md present        → patch bump
          if [ "$BREAKING" -gt 0 ] || [ "$FEATURE" -gt 0 ]; then
            echo "bump=minor" >> "$GITHUB_OUTPUT"
            echo "Fragments: $TOTAL total (breaking=$BREAKING, feature=$FEATURE, bugfix=$BUGFIX, misc=$MISC) → minor bump"
          else
            echo "bump=patch" >> "$GITHUB_OUTPUT"
            echo "Fragments: $TOTAL total (breaking=$BREAKING, feature=$FEATURE, bugfix=$BUGFIX, misc=$MISC) → patch bump"
          fi

      # ------------------------------------------------------------------
      # Read the current version from [project] in pyproject.toml.
      # ------------------------------------------------------------------
      - name: Read current version
        if: steps.fragments.outputs.has_fragments == 'true'
        id: version
        run: |
          CURRENT=$(uv run python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "current=$CURRENT" >> "$GITHUB_OUTPUT"
          echo "Current version: $CURRENT"

      # ------------------------------------------------------------------
      # Compute the next version. Must stay in the 0.x line — a non-0.x
      # current version is a hard failure (this workflow only handles the
      # pre-1.0 release cadence; callers on 1.0+ need a different path).
      # ------------------------------------------------------------------
      - name: Compute next version
        if: steps.fragments.outputs.has_fragments == 'true'
        id: next-version
        env:
          CURRENT: ${{ steps.version.outputs.current }}
          BUMP: ${{ steps.fragments.outputs.bump }}
        run: |
          MAJOR=$(echo "$CURRENT" | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | cut -d. -f3)

          if [ "$MAJOR" != "0" ]; then
            echo "ERROR: version is $CURRENT — this workflow only handles the 0.x line." >&2
            echo "If you have deliberately moved to 1.0+, remove the auto-release caller workflow." >&2
            exit 1
          fi

          if [ "$BUMP" = "minor" ]; then
            NEXT="0.$((MINOR + 1)).0"
          else
            NEXT="0.$MINOR.$((PATCH + 1))"
          fi

          echo "next=$NEXT" >> "$GITHUB_OUTPUT"
          echo "Current: $CURRENT → Next: $NEXT ($BUMP bump)"

      # ------------------------------------------------------------------
      # Build the changelog with towncrier (provisioned via --with so
      # callers need not declare it as a dependency — mirrors the
      # deptry / pytest-xdist pattern in python-ci.yml).
      # ------------------------------------------------------------------
      - name: Build changelog with towncrier
        if: steps.fragments.outputs.has_fragments == 'true'
        env:
          NEXT: ${{ steps.next-version.outputs.next }}
        run: |
          uv run --with towncrier towncrier build --yes --version "$NEXT"

      # ------------------------------------------------------------------
      # Bump the version in pyproject.toml's [project] table. The sed
      # range restricts the substitution to the [project] section so we
      # don't accidentally match a `version` key in another table.
      # The pattern matches any quoted version string (e.g. "0.1.0")
      # rather than the literal CURRENT value, so dots in the version
      # don't become regex wildcards.
      # ------------------------------------------------------------------
      - name: Bump version in pyproject.toml
        if: steps.fragments.outputs.has_fragments == 'true'
        env:
          CURRENT: ${{ steps.version.outputs.current }}
          NEXT: ${{ steps.next-version.outputs.next }}
        run: |
          sed -i '/^\[project\]/,/^\[/{s/^version = "[^"]*"/version = "'"$NEXT"'"/}' pyproject.toml
          echo "Bumped pyproject.toml version: $CURRENT → $NEXT"

      # ------------------------------------------------------------------
      # Refresh uv.lock so the release commit passes the `uv lock --check`
      # freshness gate in CI.  Use --upgrade-package <project-name> rather
      # than a bare `uv lock` — a bare lock would silently pull new @main
      # commits of git dependencies, which is never safe in a release step.
      # ------------------------------------------------------------------
      - name: Refresh lockfile for the new version
        if: steps.fragments.outputs.has_fragments == 'true'
        run: |
          if [ -f uv.lock ]; then
            PROJECT_NAME=$(uv run python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['name'])")
            uv lock --upgrade-package "$PROJECT_NAME"
            echo "Refreshed uv.lock with project version bump for $PROJECT_NAME."
          else
            echo "No uv.lock found — skipping lock refresh."
          fi

      # ------------------------------------------------------------------
      # Commit, tag, push.
      #
      # Two paths:
      # 1. Direct push (default) — push to the default branch + tag.
      # 2. PR + auto-merge (protected branches) — when a direct push is
      #    rejected by branch protection, create a release/v$VERSION
      #    branch, open a PR, and enable auto-merge with --merge (NOT
      #    --squash, so the tagged release commit stays reachable in
      #    history).
      #
      # The detect-and-fallback style mirrors dependabot-auto-merge.yml.
      #
      # CAVEAT (PR path): the tag is pushed BEFORE the PR merges, so
      # docker-release.yml builds the image from the release commit
      # while the PR is still open. The image is valid — the final
      # merge just fast-forwards the default branch to include it.
      # ------------------------------------------------------------------
      - name: Commit, tag, and push release
        if: steps.fragments.outputs.has_fragments == 'true'
        env:
          NEXT: ${{ steps.next-version.outputs.next }}
          DEFAULT_BRANCH: ${{ inputs.default-branch }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage the pyproject.toml version bump and CHANGELOG.md.
          # towncrier build already stages fragment deletions via git rm,
          # so changelog.d/ does not need (and cannot be passed to) git add.
          git add CHANGELOG.md pyproject.toml
          [ -f uv.lock ] && git add uv.lock || true
          git commit -m "Release $NEXT"

          TAG="v$NEXT"
          git tag -a "$TAG" -m "Release $NEXT"

          echo "Attempting direct push to $DEFAULT_BRANCH..."
          set +e
          push_output=$(git push origin "HEAD:$DEFAULT_BRANCH" 2>&1)
          push_rc=$?
          set -e

          if [ "$push_rc" -eq 0 ]; then
            echo "Direct push succeeded — pushing tag $TAG."
            git push origin "$TAG"
          elif echo "$push_output" | grep -qiE "protected branch|GH006|required status check"; then
            echo "Branch protection detected — falling back to PR + auto-merge."

            RELEASE_BRANCH="release/$NEXT"
            git checkout -b "$RELEASE_BRANCH"
            git push origin "$RELEASE_BRANCH"

            # Push the tag so docker-release.yml fires (the tag points
            # at the release commit on the release branch).
            git push origin "$TAG"

            PR_URL=$(gh pr create \
              --title "Release $NEXT" \
              --body "Automated changelog-driven release $NEXT." \
              --base "$DEFAULT_BRANCH" \
              --head "$RELEASE_BRANCH")
            echo "Created PR: $PR_URL"

            # Enable auto-merge with --merge (NOT --squash) so the
            # tagged release commit remains reachable in history after
            # merge.
            set +e
            merge_output=$(gh pr merge --auto --merge --delete-branch "$PR_URL" 2>&1)
            merge_rc=$?
            set -e

            if [ "$merge_rc" -eq 0 ]; then
              echo "Auto-merge queued for PR (will merge when checks pass)."
            elif echo "$merge_output" | grep -qi "merge commits are not allowed"; then
              # Squash-only repos (the fleet branch-protection standard):
              # fall back to squash auto-merge. The annotated tag keeps
              # the original release commit reachable even though main's
              # history carries the squashed equivalent.
              echo "Merge commits disallowed — enabling squash auto-merge."
              gh pr merge --auto --squash --delete-branch "$PR_URL"
            elif echo "$merge_output" | grep -qi "protected branch rules not configured"; then
              echo "No branch-protection rules — polling checks then merging directly."
              gh pr checks "$PR_URL" --watch --fail-fast
              gh pr merge --merge --delete-branch "$PR_URL"
            else
              echo "Auto-merge could not be enabled:"
              printf '%s\n' "$merge_output" >&2
              echo "PR is still open — manual merge required."
            fi
          else
            printf '%s\n' "$push_output" >&2
            exit "$push_rc"
          fi
