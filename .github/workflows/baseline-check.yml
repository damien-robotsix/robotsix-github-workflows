name: Baseline Check

on:
  workflow_call:
    inputs:
      has-docker:
        description: >
          Set true when the caller repo builds and pushes a container image.
          The check then additionally requires package-ecosystem: docker in
          dependabot.yml. Auto-detection also fires when a Dockerfile exists
          at the repo root at check time.
        required: false
        type: boolean
        default: false
      has-board:
        description: >
          Set true when the caller repo uses the robotsix board (docs/modules.yaml).
          Enables the modules-drift job which validates module registration and
          path consistency via robotsix-modules.
        required: false
        type: boolean
        default: false
      python-version:
        description: Python version for the modules-drift job.
        required: false
        type: string
        default: "3.14"
      uv-version:
        description: uv version for the modules-drift job.
        required: false
        type: string
        default: "0.8.15"

permissions:
  contents: read

jobs:
  baseline:
    name: Baseline
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # persist-credentials: false is the repo convention — this workflow
      # only reads source files and never pushes.
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v4
        with:
          persist-credentials: false

      # AGENT.md is required at the repo root so autonomous agents have a
      # repo-specific context file to load.  The standards link must appear
      # within the first 20 lines so agents that read only the file header
      # still discover the canonical standards repository.
      - name: Check AGENT.md exists and links robotsix-standards
        run: |
          if [ ! -f AGENT.md ]; then
            echo "::error::AGENT.md is missing from repo root — create one following https://github.com/damien-robotsix/robotsix-standards"
            exit 1
          fi

          # Use grep -qE for the extended regex (single-character
          # alternation in the repo slug).  The regex is intentionally
          # loose — we only care that the link is present, not that it
          # is perfectly formatted Markdown.
          if ! head -n 20 AGENT.md | grep -qE 'damien-robotsix/robotsix-standards'; then
            echo "::error::AGENT.md does not reference damien-robotsix/robotsix-standards in the first 20 lines"
            exit 1
          fi

      # README.md must exist and link to the robotsix standards
      # repository.  Unlike AGENT.md, the link can appear anywhere in the
      # file — README files are often long and the standards link is
      # conventionally near the bottom.
      - name: Check README.md exists and links robotsix-standards
        run: |
          if [ ! -f README.md ]; then
            echo "::error::README.md is missing from repo root"
            exit 1
          fi

          if ! grep -qE 'damien-robotsix/robotsix-standards' README.md; then
            echo "::error::README.md does not reference damien-robotsix/robotsix-standards"
            exit 1
          fi

      # LICENSE must be present and must be the MIT license.  The check
      # looks for the distinctive MIT permission grant in the first 20
      # lines — this is mechanical, not a full legal review.
      - name: Check LICENSE is MIT
        run: |
          if [ ! -f LICENSE ]; then
            echo "::error::LICENSE is missing from repo root — add an MIT license file"
            exit 1
          fi

          # The MIT license is identifiable by its distinctive permission
          # grant.  Check both the SPDX header form ("MIT License") and
          # the body text ("Permission is hereby granted").
          if ! head -n 20 LICENSE | grep -qE 'MIT License|Permission is hereby granted'; then
            echo "::error::LICENSE does not appear to be the MIT license (expected 'MIT License' or 'Permission is hereby granted' in first 20 lines)"
            exit 1
          fi

      # Dependabot must cover at minimum the three universal ecosystems:
      # uv (Python deps), github-actions (workflow pinning), and
      # pre-commit (hook pinning).  Docker is additionally required when
      # the repo ships a container image (has-docker input or root
      # Dockerfile).  npm is additionally required when package.json
      # exists at the repo root (Node.js projects).
      #
      # Boolean inputs arrive as the string "true"/"false" when routed
      # through env: — compare with = not == for POSIX portability.
      - name: Check .github/dependabot.yml covers required ecosystems
        env:
          HAS_DOCKER: ${{ inputs.has-docker }}
        run: |
          DEPBOT=".github/dependabot.yml"

          if [ ! -f "$DEPBOT" ]; then
            echo "::error::.github/dependabot.yml is missing — add Dependabot config covering uv, github-actions, and pre-commit"
            exit 1
          fi

          # check_ecosystem accepts both unquoted (package-ecosystem: uv)
          # and double-quoted (package-ecosystem: "uv") YAML forms.
          check_ecosystem() {
            grep -qE "package-ecosystem:[[:space:]]+\"?${1}\"?" "$DEPBOT"
          }

          FAIL=0
          for eco in github-actions pre-commit; do
            if ! check_ecosystem "$eco"; then
              echo "::error::.github/dependabot.yml is missing package-ecosystem: ${eco}"
              FAIL=1
            fi
          done

          # uv ecosystem required when the repo contains a pyproject.toml
          # (Python project).  Auto-detected from the file's presence.
          if [ -f pyproject.toml ]; then
            if ! check_ecosystem uv; then
              echo "::error::.github/dependabot.yml is missing package-ecosystem: uv (pyproject.toml detected)"
              FAIL=1
            fi
          fi

          # Docker ecosystem required when the repo ships a container
          # image: either the caller declared has-docker: true, or a
          # Dockerfile is present at the repo root (auto-detection).
          if [ "$HAS_DOCKER" = "true" ] || [ -f Dockerfile ]; then
            if ! check_ecosystem docker; then
              echo "::error::.github/dependabot.yml is missing package-ecosystem: docker (Dockerfile detected or has-docker=true)"
              FAIL=1
            fi
          fi

          # npm ecosystem required when the repo contains a package.json
          # (Node.js project).  Auto-detected from the file's presence.
          if [ -f package.json ]; then
            if ! check_ecosystem npm; then
              echo "::error::.github/dependabot.yml is missing package-ecosystem: npm (package.json detected)"
              FAIL=1
            fi
          fi

          [ "$FAIL" -eq 0 ] || exit 1

      # Repos that use towncrier for changelog management must have a
      # changelog.d/ fragment directory and a [tool.towncrier] section in
      # pyproject.toml.  This check is auto-detected: it only fires when
      # pyproject.toml exists, skipping repos that don't use Python.
      - name: Check changelog.d/ and towncrier config
        run: |
          if [ ! -f pyproject.toml ]; then
            echo "pyproject.toml not found — skipping towncrier check"
            exit 0
          fi

          FAIL=0

          if [ ! -d changelog.d ]; then
            echo "::error::changelog.d/ directory is missing — towncrier needs a fragment directory"
            FAIL=1
          fi

          # [tool.towncrier] is the standard TOML section header for
          # towncrier configuration in pyproject.toml.
          if ! grep -q '^\[tool\.towncrier\]' pyproject.toml; then
            echo "::error::pyproject.toml is missing [tool.towncrier] section"
            FAIL=1
          fi

          [ "$FAIL" -eq 0 ] || exit 1

  # Modules-drift gate: validates docs/modules.yaml registration and path
  # consistency.  Only runs when the caller opts in with has-board: true,
  # since it requires Python, uv, and robotsix-modules to be available.
  modules:
    name: Modules drift
    if: ${{ inputs.has-board }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v4
        with:
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ inputs.python-version }}

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: ${{ inputs.uv-version }}

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Validate modules.yaml
        run: uv run --frozen robotsix-modules validate docs/modules.yaml

      - name: Check module registration
        run: uv run --frozen robotsix-modules check-registration docs/modules.yaml --root .

      - name: Validate module paths
        run: uv run --frozen robotsix-modules validate-paths docs/modules.yaml --root .
