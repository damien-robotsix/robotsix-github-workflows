name: Deps Bump

# CRITICAL: This workflow pushes commits and creates PRs, so it MUST use a
# caller-supplied token that is NOT the default GITHUB_TOKEN. GitHub
# deliberately suppresses workflow runs for events created by
# GITHUB_TOKEN to prevent recursion — if the caller passes GITHUB_TOKEN,
# CI workflows will NOT fire on the bump PR and no gate will run. Use a
# fine-grained PAT, a GitHub App installation token, or a deploy key.

on:
  workflow_call:
    inputs:
      packages:
        description: >
          Space-separated list of first-party package names to upgrade,
          e.g. "robotsix-mill robotsix-llmio". Each name becomes a
          separate --upgrade-package flag on uv lock.
        required: true
        type: string
      uv-version:
        description: uv version to install.
        required: false
        type: string
        default: "0.8.15"
      default-branch:
        description: Base branch for the PR and the git push target.
        required: false
        type: string
        default: "main"
      bump-branch:
        description: >
          Branch to force-push the bump commit to. Stable name → repeated
          runs overwrite; an open PR on the branch is detected and reused
          rather than duplicated.
        required: false
        type: string
        default: "deps-bump/first-party"
    secrets:
      bump-token:
        description: >
          Token used to push the bump branch and create/update the PR.
          MUST NOT be the default GITHUB_TOKEN — GitHub suppresses
          workflow runs for events created by GITHUB_TOKEN, so CI would
          not fire on the bump PR. Use a fine-grained PAT, a GitHub App
          installation token, or a deploy key.
        required: true

jobs:
  bump:
    runs-on: ubuntu-latest
    permissions:
      contents: write       # push bump branch
      pull-requests: write  # gh pr create
    steps:
      # Checkout with the caller-supplied bump token so the persisted
      # credential carries the correct identity for git push.
      # Unlike most workflows in this repo, persist-credentials is
      # intentionally omitted (defaults to true) — this job must push
      # the bump branch.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          token: ${{ secrets.bump-token }}
          fetch-depth: 0

      # uv lock resolves package metadata without requiring a Python
      # interpreter installation, so no actions/setup-python step is
      # needed here.
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: ${{ inputs.uv-version }}

      - name: Upgrade first-party pins
        env:
          PACKAGES: ${{ inputs.packages }}
        run: |
          flags=""
          # shellcheck disable=SC2086
          for pkg in $PACKAGES; do
            flags="$flags --upgrade-package $pkg"
          done
          # shellcheck disable=SC2086
          uv lock $flags

      - name: Detect changes
        id: diff
        run: |
          git diff --quiet uv.lock && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push bump branch
        if: steps.diff.outputs.changed == 'true'
        env:
          BUMP_BRANCH: ${{ inputs.bump-branch }}
          DEFAULT_BRANCH: ${{ inputs.default-branch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BUMP_BRANCH"
          git add uv.lock
          git commit -m "chore: bump first-party pins"
          git push --force origin "$BUMP_BRANCH"

      - name: Open or reuse PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.bump-token }}
          BUMP_BRANCH: ${{ inputs.bump-branch }}
          DEFAULT_BRANCH: ${{ inputs.default-branch }}
        run: |
          # Reuse an existing open PR rather than creating a duplicate.
          EXISTING=$(gh pr list --head "$BUMP_BRANCH" --base "$DEFAULT_BRANCH" --json number -q '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            echo "PR #${EXISTING} already open for ${BUMP_BRANCH} — updated by the force-push above."
          else
            gh pr create \
              --title "chore: bump first-party pins" \
              --body "Automated first-party pin bump via \`uv lock --upgrade-package\`." \
              --base "$DEFAULT_BRANCH" \
              --head "$BUMP_BRANCH"
          fi
