name: Deps Bump

# CRITICAL: This workflow pushes commits and creates PRs, so it MUST use a
# caller-supplied credential that is NOT the default GITHUB_TOKEN.
# GitHub deliberately suppresses workflow runs for events created by
# GITHUB_TOKEN to prevent recursion — CI workflows will NOT fire on the
# bump PR if you pass GITHUB_TOKEN.
#
# The caller MUST supply a GitHub App (app-id input + app-private-key
# secret). An installation token is minted per run; no expiry/rotation,
# bot identity. App tokens live ~1h so they cannot be stored as a
# static secret, which is why minting happens HERE and not in the
# caller (reusable-workflow `secrets:` cannot carry runtime step
# outputs).

on:
  workflow_call:
    inputs:
      packages:
        description: >
          Space-separated list of first-party package names to upgrade,
          e.g. "robotsix-mill robotsix-llmio". Each name becomes a
          separate --upgrade-package flag on uv lock.
        required: true
        type: string
      uv-version:
        description: uv version to install.
        required: false
        type: string
        default: "0.8.15"
      default-branch:
        description: Base branch for the PR and the git push target.
        required: false
        type: string
        default: "main"
      bump-branch:
        description: >
          Branch to force-push the bump commit to. Stable name → repeated
          runs overwrite; an open PR on the branch is detected and reused
          rather than duplicated.
        required: false
        type: string
        default: "deps-bump/first-party"
      app-id:
        description: >
          GitHub App ID used to mint an installation token for the
          bump push (pair with the app-private-key secret). The app
          must be installed on the repo with contents:write and
          pull-requests:write.
        required: true
        type: string
    secrets:
      app-private-key:
        description: >
          PEM private key of the GitHub App named by the app-id
          input. Required when app-id is set.
        required: true

permissions:
  contents: read

jobs:
  bump:
    name: Bump
    runs-on: ubuntu-latest
    permissions:
      contents: write       # push bump branch
      pull-requests: write  # gh pr create
    steps:
      - name: Mint GitHub App installation token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349  # v2.2.2
        with:
          app-id: ${{ inputs.app-id }}
          private-key: ${{ secrets.app-private-key }}

      # Checkout with the caller-supplied bump token so the persisted
      # credential carries the correct identity for git push.
      # Unlike most workflows in this repo, persist-credentials is
      # intentionally omitted (defaults to true) — this job must push
      # the bump branch.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      # uv lock resolves package metadata without requiring a Python
      # interpreter installation, so no actions/setup-python step is
      # needed here.
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: ${{ inputs.uv-version }}

      - name: Upgrade first-party pins
        env:
          PACKAGES: ${{ inputs.packages }}
        run: |
          flags=""
          # shellcheck disable=SC2086
          for pkg in $PACKAGES; do
            flags="$flags --upgrade-package $pkg"
          done
          # shellcheck disable=SC2086
          uv lock $flags

      - name: Detect changes
        id: diff
        run: |
          git diff --quiet uv.lock && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit and push bump branch
        if: steps.diff.outputs.changed == 'true'
        env:
          BUMP_BRANCH: ${{ inputs.bump-branch }}
          DEFAULT_BRANCH: ${{ inputs.default-branch }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BUMP_BRANCH"
          git add uv.lock
          git commit -m "chore: bump first-party pins"
          git push --force origin "$BUMP_BRANCH"

      - name: Open or reuse PR
        if: steps.diff.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          BUMP_BRANCH: ${{ inputs.bump-branch }}
          DEFAULT_BRANCH: ${{ inputs.default-branch }}
        run: |
          # Reuse an existing open PR rather than creating a duplicate.
          EXISTING=$(gh pr list --head "$BUMP_BRANCH" --base "$DEFAULT_BRANCH" --json number -q '.[0].number' 2>/dev/null || echo "")
          if [ -n "$EXISTING" ]; then
            echo "PR #${EXISTING} already open for ${BUMP_BRANCH} — updated by the force-push above."
          else
            gh pr create \
              --title "chore: bump first-party pins" \
              --body "Automated first-party pin bump via \`uv lock --upgrade-package\`." \
              --base "$DEFAULT_BRANCH" \
              --head "$BUMP_BRANCH"
          fi
