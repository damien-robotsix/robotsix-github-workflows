name: Dependency Bot Auto-Merge

# Auto-merges dependency-update PRs from Dependabot *or* Renovate. Filename kept
# as dependabot-auto-merge.yml so existing callers don't break.

on:
  workflow_call:

permissions:
  contents: read

jobs:
  auto-merge:
    name: Auto-merge
    runs-on: ubuntu-latest
    if: github.actor == 'dependabot[bot]' || github.actor == 'renovate[bot]' || github.actor == 'robotsix-mill[bot]'
    timeout-minutes: 30
    permissions:
      contents: write        # auto-merge via gh pr merge
      pull-requests: write   # label PR + gh pr merge

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      # Dependabot exposes structured metadata; Renovate does not. The step is
      # skipped for Renovate PRs and the merge proceeds without update-type.
      - name: Fetch dependabot metadata
        id: metadata
        if: github.actor == 'dependabot[bot]'
        uses: dependabot/fetch-metadata@21025c705c08248db411dc16f3619e6b5f9ea21a  # v2
        with:
          github-token: "${{ secrets.GITHUB_TOKEN }}"

      - name: Label PR as Skip-Changelog
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr edit "$PR_URL" --add-label "Skip-Changelog"

      - name: Auto-merge dependency PR
        env:
          PR_URL: ${{ github.event.pull_request.html_url }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          UPDATE_TYPE: ${{ steps.metadata.outputs.update-type }}
        run: |
          echo "Bot: $GITHUB_ACTOR${UPDATE_TYPE:+ | update-type: $UPDATE_TYPE}"

          set +e
          output=$(gh pr merge --auto --squash --delete-branch "$PR_URL" 2>&1)
          rc=$?
          set -e

          if [ "$rc" -eq 0 ]; then
            echo "Auto-merge queued (protected repo — will merge when checks pass)"
          elif echo "$output" | grep -qi "protected branch rules not configured"; then
            echo "No branch-protection rules detected — polling checks then merging directly"
            gh pr checks "$PR_URL" --watch --fail-fast
            gh pr merge --squash --delete-branch "$PR_URL"
          else
            printf '%s\n' "$output" >&2
            exit "$rc"
          fi
