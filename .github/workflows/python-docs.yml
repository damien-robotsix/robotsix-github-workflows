name: Python Docs

on:
  workflow_call:
    inputs:
      docs-install-args:
        description: Dependency-install flags appended to `uv sync --frozen` (free-form string; `--group docs` for mill, `--extra docs` for auto-mail).
        required: false
        type: string
        default: "--group docs"
      python-version:
        description: Python version to set up.
        required: false
        type: string
        default: "3.14"
      uv-version:
        description: uv version to install.
        required: false
        type: string
        default: "0.8.15"
      retries:
        description: Number of dependency-install attempts in the retry loop.
        required: false
        type: string
        default: "4"

# Deploys to GitHub Pages via the modern Pages Actions (build type: "workflow").
# Callers grant `pages: write` + `id-token: write` (not `contents: write`), so
# this must NOT use `mkdocs gh-deploy` (which pushes to the gh-pages branch and
# needs `contents: write` — a caller-permission mismatch that fails the run at
# startup). Enable Pages once per repo with source "GitHub Actions".
#
# No workflow-level concurrency here: in a called workflow `github.workflow`
# resolves to the CALLER's workflow name, so a caller using a
# `${{ github.workflow }}-...` group would deadlock against this. Callers own
# concurrency (e.g. `group: pages`).

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          persist-credentials: false

      - uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d  # v6.0.0

      # Interpreter comes from setup-python (same pattern as ci.yml): the locked
      # griffelib needs a recent 3.14.x patch that the uv-managed manifest
      # predates. setup-python's manifest tracks new patch releases independently.
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: ${{ inputs.python-version }}

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: ${{ inputs.uv-version }}

      - name: Install docs deps
        env:
          UV_PROJECT_ENVIRONMENT: system
          DOCS_INSTALL_ARGS: ${{ inputs.docs-install-args }}
          RETRIES: ${{ inputs.retries }}
        run: |
          for i in $(seq 1 "$RETRIES"); do
            echo "Attempt $i/$RETRIES..."
            # shellcheck disable=SC2086
            if uv sync --frozen $DOCS_INSTALL_ARGS; then
              echo "Install succeeded on attempt $i/$RETRIES"
              exit 0
            fi
            if [ "$i" -lt "$RETRIES" ]; then
              echo "Attempt $i/$RETRIES failed — retrying in 10s..."
              sleep 10
            fi
          done
          echo "All $RETRIES attempts failed."
          exit 1

      - name: Build site
        env:
          UV_PROJECT_ENVIRONMENT: system
        run: uv run --frozen mkdocs build

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9  # v5.0.0
        with:
          path: site

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128  # v5.0.0
