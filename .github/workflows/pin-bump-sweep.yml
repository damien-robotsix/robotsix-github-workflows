name: Pin Bump Sweep

# Coherent-set fleet-wide pin-bump sweep.
#
# Enumerates every non-archived, non-fork repository owned by the configured
# org, collects all [tool.uv.sources] git-sourced pins across the fleet,
# resolves the HEAD commit of each unique git URL ONCE, and then opens a PR
# in every affected repository so that all repos that share a dependency
# receive the same SHA update in the same sweep.
#
# Scheduled weekly (Monday 06:00 UTC) and available for manual dispatch.
# Also callable via workflow_call for programmatic triggering.

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      owner:
        description: GitHub org/owner whose repos are swept.
        required: false
        type: string
        default: "damien-robotsix"
  workflow_call:
    inputs:
      owner:
        description: GitHub org/owner whose repos are swept.
        required: false
        type: string
        default: "damien-robotsix"
      uv-version:
        description: uv version to install.
        required: false
        type: string
        default: "0.8.15"
      app-id:
        description: >
          GitHub App ID used to mint an installation token for the
          sweep (pair with the app-private-key secret). The app
          must be installed on every fleet repository with
          contents:write and pull-requests:write.
        required: true
        type: string
    secrets:
      app-private-key:
        description: >
          PEM private key of the GitHub App named by the app-id
          input.
        required: true

permissions:
  contents: read

jobs:
  sweep:
    name: Coherent-set sweep
    if: ${{ github.event_name == 'workflow_call' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 60
    steps:
      - name: Mint GitHub App installation token
        id: app-token
        uses: actions/create-github-app-token@fee1f7d63c2ff003460e3d139729b119787bc349  # v2.2.2
        with:
          app-id: ${{ inputs.app-id }}
          private-key: ${{ secrets.app-private-key }}

      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1  # v4
        with:
          persist-credentials: false

      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39  # v8.2.0
        with:
          version: ${{ inputs.uv-version }}

      - name: Run coherent-set sweep
        env:
          SWEEP_TOKEN: ${{ steps.app-token.outputs.token }}
          OWNER: ${{ inputs.owner || 'damien-robotsix' }}
        run: |
          python3 scripts/pin-bump.py sweep \
            --owner "$OWNER" \
            --token-env SWEEP_TOKEN
